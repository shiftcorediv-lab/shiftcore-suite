<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pick My Off</title>
  <link rel="stylesheet" href="./css/pmo.css" />
</head>
<body>
  <div id="lineWarningBanner" style="background:#ffebee;color:#c62828;text-align:center;padding:12px;font-size:14px;font-weight:bold;border-bottom:1px solid #ffcdd2;">
    ⚠ LINE内ブラウザでは正常に動作しない場合があります。<br>
    ブラウザメニューから「外部ブラウザで開く」を選択してください。
  </div>

  <div class="container" id="mainFormArea">
    <div class="card">
      <h1>Pick My Off<br>希望休回収ツール</h1>
      <div class="description">
        ShiftCore連携でログイン済みの状態です。翌月の希望休を提出してください。
      </div>

      <div id="entryBannerArea"></div>

      <label>ログインユーザー</label>
      <div class="info-box" id="userNameBox">取得中...</div>

      <div class="mt-12">
        <label>社員コード</label>
        <div class="info-box" id="employeeCodeBox">取得中...</div>
      </div>

      <div class="mt-12">
        <label>アカウント情報</label>
        <div id="accountMetaArea"></div>
      </div>

      <div class="mt-12" id="inactiveWarningArea" style="display:none;">
        <div class="danger-box">
          このアカウントは現在「非稼働（off）」です。<br>
          希望休の提出対象外のため、この画面からは送信できません。
        </div>
      </div>
    </div>

    <div class="card">
      <h2>希望休選択</h2>

      <div class="month-control">
        <div class="month-title" id="monthTitle"></div>
      </div>

      <div class="weekday-row">
        <div class="weekday sun">日</div>
        <div class="weekday">月</div>
        <div class="weekday">火</div>
        <div class="weekday">水</div>
        <div class="weekday">木</div>
        <div class="weekday">金</div>
        <div class="weekday sat">土</div>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>

      <div class="button-row mt-12">
        <button class="clear-btn" id="noHolidayBtn" type="button">希望休なし</button>
        <button class="clear-btn" id="clearSelectionBtn" type="button">選択をクリア</button>
      </div>

      <div class="mt-16">
        <label>選択中の希望休</label>
        <div class="selected-list" id="selectedDatesBox">未選択</div>
        <div class="hint" id="noHolidayHint"></div>
      </div>
    </div>

    <div class="card">
      <h2>補足メモ</h2>
      <label for="note">メモ</label>
      <textarea id="note" placeholder="任意で補足を入力"></textarea>
    </div>

    <div class="card">
      <button class="submit-btn" id="submitBtn" type="button">希望休を送信</button>
      <div class="message" id="messageBox"></div>
    </div>
  </div>

  <div class="container" id="completeScreen">
    <div class="card">
      <div class="complete-icon">✅</div>
      <div class="complete-title">送信完了</div>
      <div class="complete-text" id="completeText">希望休の送信が完了しました。</div>
      <div class="complete-detail" id="completeDetail"></div>
      <button class="submit-btn mt-16" id="backToFormBtn" type="button">入力画面へ戻る</button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
