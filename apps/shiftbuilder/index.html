<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ShiftBuilder β版 | ShiftCore</title>

  <link rel="stylesheet" href="../../shared/css/shiftcore-ui.css" />
  <link rel="stylesheet" href="./css/shiftbuilder.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>ShiftBuilder <span class="beta-badge">β版</span></h1>
        <p class="subtitle">
          この機能はベータ版です。運用しながら改善中のため、表示内容や操作仕様が変更される場合があります。
        </p>
      </div>

      <div class="header-actions">
        <button id="dashboardBtn" type="button" class="secondary-button">Dashboardへ戻る</button>
        <button id="reloadBtn" type="button" class="primary-button">再読み込み</button>
      </div>
    </header>

    <section class="operator-card">
      <div>
        <div class="label">ログイン中</div>
        <div id="operatorText" class="operator-text">確認中...</div>
        <div id="permissionText" class="permission-text">ShiftBuilder権限を確認中...</div>
      </div>

      <div id="permissionBadge" class="badge">確認中</div>
    </section>

    <section class="panel">
      <h2>接続確認</h2>
      <p class="hint">
        まずは Firebaseログイン状態と ShiftBuilder API 認証が通るかを確認します。
      </p>

      <div class="info-grid">
        <div class="info-card">
          <div class="label">API接続</div>
          <div id="apiStatusText" class="info-value">未確認</div>
        </div>

        <div class="info-card">
          <div class="label">ユーザー名</div>
          <div id="userNameText" class="info-value">-</div>
        </div>

        <div class="info-card">
          <div class="label">ShiftBuilder権限</div>
          <div id="shiftPermissionText" class="info-value">-</div>
        </div>

        <div class="info-card">
          <div class="label">編集権限</div>
          <div id="editPermissionText" class="info-value">-</div>
        </div>
      </div>
    </section>

    <section class="status-box" id="statusBox">
      初期化待ち
    </section>
  </main>

  <script type="module" src="./js/shiftbuilder/main.js"></script>
</body>
</html>
