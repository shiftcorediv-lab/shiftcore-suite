<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick My Off Admin</title>
  <link rel="stylesheet" href="../../shared/css/pmo-header.css" />
  <link rel="stylesheet" href="./css/pmo-admin.css?v=9" />
  <link rel="stylesheet" href="./css/common-loading.css?v=8" />
</head>
<body>
  <div class="container">
    <header class="pmo-header">
      <div>
        <h1 class="pmo-header-title">PMO</h1>
        <p class="pmo-header-subtitle">希望休管理</p>
      </div>

      <div class="pmo-header-actions">
        <button class="pmo-dashboard-button" id="backToDashboardBtn" type="button">Dashboardへ戻る</button>
      </div>
    </header>

    <div class="card compact-card">
      <h2>ログイン情報</h2>

      <div class="info-compact-grid info-compact-grid-3">
        <div class="info-compact-item">
          <label>ログインユーザー</label>
          <div class="info-box" id="userNameBox">取得中...</div>
        </div>

        <div class="info-compact-item">
          <label>社員コード</label>
          <div class="info-box" id="employeeCodeBox">取得中...</div>
        </div>

        <div class="info-compact-item">
          <label>ロール</label>
          <div class="info-box" id="roleBox">取得中...</div>
        </div>
      </div>

      <div id="entryBannerArea"></div>
      <div id="accountMetaArea" style="display: none;"></div>
    </div>

    <div class="card compact-action-card">
  <h2>対象月と操作</h2>

  <div class="action-toolbar">
    <div class="action-toolbar-main">
      <label for="monthSelect">表示する月を選択</label>
      <select id="monthSelect" class="select-box"></select>
      <div class="hint" id="monthHint">存在する月のみ選択できます。</div>
    </div>

    <div class="action-toolbar-buttons">
      <button class="open-btn" id="refreshTableBtn" type="button">一覧を更新</button>
      <button class="csv-btn" id="downloadCsvBtn" type="button">Excel出力</button>
    </div>
  </div>

  <div class="action-status-row">
    <div class="hint" id="manageHint">
      対象月を選択後、一覧を更新すると最新状態を読み込みます。
    </div>
    <div class="message" id="messageBox"></div>
  </div>
</div>

    <div class="card">
      <h2>希望休一覧</h2>
      <div class="hint">
        この画面上で月次一覧を確認できます。原本スプレッドシートの直接操作は行いません。
      </div>

      <div class="table-wrap">
        <div id="requestTableArea" class="table-placeholder">
          認証確認後に一覧を表示します。
        </div>
      </div>
    </div>

    <div class="card" id="developerToolsCard" style="display: none;">
      <h2>developer専用</h2>
      <div class="hint">原本確認やスプレッドシート直接確認が必要な場合のみ使用します。</div>

      <div class="button-stack">
        <button class="open-btn" id="openMonthlyBtn" type="button">希望休一覧スプシを開く</button>
        <button class="open-btn" id="openRequestBtn" type="button">申請原本を開く</button>
      </div>
    </div>

  </div>

  <script type="module" src="./js/pmo-admin/main.js?v=9"></script>
</body>
</html>
