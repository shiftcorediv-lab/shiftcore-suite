<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Portal</title>
  <link rel="stylesheet" href="./css/account-portal.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>アカウント基盤</h1>
      <div class="description">
        アカウント関連の管理機能を選択してください。
      </div>

      <div id="entryBannerArea"></div>

      <label>ログインユーザー</label>
      <div class="info-box" id="userNameBox">取得中...</div>

      <div class="mt-12">
        <label>社員コード</label>
        <div class="info-box" id="employeeCodeBox">取得中...</div>
      </div>

      <div class="mt-12">
        <label>アカウント情報</label>
        <div id="accountMetaArea"></div>
      </div>
    </div>

    <div class="card">
      <h2>操作を選択</h2>

      <div class="button-stack">
        <button class="main-btn" id="goSignupAdminBtn" type="button">登録申請管理</button>
      </div>

      <div class="hint" id="portalHint">管理対象ロールのみ利用できます。</div>
    </div>

    <div class="card">
      <button class="back-btn" id="backToDashboardBtn" type="button">ダッシュボードへ戻る</button>
      <div class="message" id="messageBox"></div>
    </div>
  </div>

  <script type="module" src="./js/account-portal/main.js"></script>
</body>
</html>
