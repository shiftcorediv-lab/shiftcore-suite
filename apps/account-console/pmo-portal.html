<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMO Portal</title>
  <link rel="stylesheet" href="../../shared/css/pmo-header.css" />
  <link rel="stylesheet" href="./css/pmo-portal.css" />
</head>
<body>
  <div class="container">
    <header class="pmo-header">
      <div>
        <h1 class="pmo-header-title">PMO</h1>
        <p class="pmo-header-subtitle">希望休メニュー</p>
      </div>

      <div class="pmo-header-actions">
        <button class="pmo-dashboard-button" id="backToDashboardBtn" type="button">Dashboardへ戻る</button>
      </div>
    </header>

    <div id="developerMetaArea" class="developer-meta" style="display: none;"></div>

    <div class="card compact-card">
      <h2>ログイン情報</h2>

      <div class="info-compact-grid info-compact-grid-3">
        <div class="info-compact-item">
          <label>ログインユーザー</label>
          <div class="info-box" id="userNameBox">取得中...</div>
        </div>

        <div class="info-compact-item">
          <label>社員コード</label>
          <div class="info-box" id="employeeCodeBox">取得中...</div>
        </div>

        <div class="info-compact-item">
          <label>ロール</label>
          <div class="info-box" id="roleBox">取得中...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>操作を選択</h2>

      <div class="button-stack">
        <button class="submit-btn" id="goApplyBtn" type="button">希望休を申請する</button>
        <button class="manage-btn" id="goManageBtn" type="button">希望休を管理する</button>
      </div>

      <div class="hint" id="manageHint">
        管理機能は管理対象ロールのみ利用できます。
      </div>
    </div>

    <div class="message" id="messageBox"></div>
  </div>

  <script type="module" src="./js/pmo-portal/main.js?v=3"></script>
</body>
</html>
