<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMO Portal</title>
  <link rel="stylesheet" href="./css/pmo-portal.css" />
</head>
<body>
  <div id="developerMetaArea" class="developer-meta" style="display: none;"></div>

  <div class="container">
    <div class="card compact-card">
      <h1>PMO</h1>
      <div class="description">
        希望休の申請または管理を選択してください。
      </div>

      <div class="info-compact-grid info-compact-grid-3">
        <div class="info-compact-item">
          <label>ログインユーザー</label>
          <div class="info-box" id="userNameBox">取得中...</div>
        </div>

        <div class="info-compact-item">
          <label>社員コード</label>
          <div class="info-box" id="employeeCodeBox">取得中...</div>
        </div>

        <div class="info-compact-item">
          <label>ロール</label>
          <div class="info-box" id="roleBox">取得中...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>操作を選択</h2>

      <div class="button-stack">
        <button class="submit-btn" id="goApplyBtn" type="button">希望休を申請する</button>
        <button class="manage-btn" id="goManageBtn" type="button">希望休を管理する</button>
      </div>

      <div class="hint" id="manageHint">
        管理機能は管理対象ロールのみ利用できます。
      </div>
    </div>

    <div class="card">
      <button class="clear-btn" id="backToDashboardBtn" type="button">ダッシュボードへ戻る</button>
      <div class="message" id="messageBox"></div>
    </div>
  </div>

  <script type="module" src="./js/pmo-portal/main.js?v=2"></script>
</body>
</html>
